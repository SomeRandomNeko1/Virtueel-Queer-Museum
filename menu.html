<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museum of Digital Arts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&family=EB+Garamond:wght@400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #faf9f7;
            /* ✅ Originele lichte achtergrond */
            font-family: 'Cormorant Garamond', serif;
            min-height: 100vh;
        }

        /* Three.js Canvas - alleen zichtbaar na menu */
        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        #three-canvas.active {
            opacity: 1;
            pointer-events: auto;
        }

        #three-loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            color: rgba(120, 100, 80, 0.6);
            font-family: 'EB Garamond', serif;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        #three-loader.active {
            opacity: 1;
        }

        /* === ORIGINELE LICHTE MENU STYLING === */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(180, 160, 130, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(180, 160, 130, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 50% 20%, rgba(180, 160, 130, 0.02) 0%, transparent 40%);
            z-index: 0;
        }

        .floating-decor {
            position: fixed;
            border: 1px solid rgba(180, 160, 130, 0.15);
            border-radius: 50%;
            pointer-events: none;
            animation: float 20s ease-in-out infinite;
        }

        .decor-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .decor-2 {
            width: 200px;
            height: 200px;
            bottom: -50px;
            left: -50px;
            animation-delay: -5s;
        }

        .decor-3 {
            width: 150px;
            height: 150px;
            top: 50%;
            left: 10%;
            animation-delay: -10s;
            opacity: 0.5;
        }

        .decor-4 {
            width: 100px;
            height: 100px;
            top: 30%;
            right: 15%;
            animation-delay: -15s;
            opacity: 0.4;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            25% {
                transform: translate(10px, -15px) rotate(2deg);
            }

            50% {
                transform: translate(-5px, 10px) rotate(-1deg);
            }

            75% {
                transform: translate(-10px, -5px) rotate(1deg);
            }
        }

        #menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #menu-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .menu-header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 1.5s ease-out;
        }

        .menu-header .subtitle {
            font-family: 'EB Garamond', serif;
            font-size: 14px;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: rgba(120, 100, 80, 0.6);
            margin-bottom: 15px;
        }

        .menu-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            font-weight: 400;
            color: #2a2520;
            letter-spacing: 6px;
            line-height: 1.1;
        }

        .menu-header .divider {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(120, 100, 80, 0.4), transparent);
            margin: 25px auto;
        }

        .menu-header .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 300;
            color: rgba(80, 70, 60, 0.5);
            font-style: italic;
            letter-spacing: 3px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: all;
        }

        .menu-btn {
            position: relative;
            width: 320px;
            padding: 20px 40px;
            background: transparent;
            border: 1px solid rgba(120, 100, 80, 0.2);
            color: #3a3530;
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 6px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            overflow: hidden;
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(120, 100, 80, 0.05), transparent);
            transition: left 0.6s ease;
        }

        .menu-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8b7355, transparent);
            transition: width 0.5s ease;
        }

        .menu-btn:hover {
            border-color: rgba(120, 100, 80, 0.4);
            color: #6b5a48;
            background: rgba(120, 100, 80, 0.03);
            transform: scale(1.02);
        }

        .menu-btn:hover::before {
            left: 100%;
        }

        .menu-btn:hover::after {
            width: 80%;
        }

        .menu-btn:active {
            transform: scale(0.98);
        }

        .menu-btn .btn-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .menu-btn:hover .btn-icon {
            opacity: 0.5;
            transform: translateY(-50%) translateX(5px);
        }

        .menu-footer {
            position: fixed;
            bottom: 40px;
            text-align: center;
            color: rgba(80, 70, 60, 0.3);
            font-family: 'EB Garamond', serif;
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .menu-corner {
            position: fixed;
            width: 60px;
            height: 60px;
            border-color: rgba(120, 100, 80, 0.15);
            border-style: solid;
        }

        .corner-tl {
            top: 30px;
            left: 30px;
            border-width: 1px 0 0 1px;
        }

        .corner-tr {
            top: 30px;
            right: 30px;
            border-width: 1px 1px 0 0;
        }

        .corner-bl {
            bottom: 30px;
            left: 30px;
            border-width: 0 0 1px 1px;
        }

        .corner-br {
            bottom: 30px;
            right: 30px;
            border-width: 0 1px 1px 0;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-animate {
            animation: fadeInUp 0.8s ease-out backwards;
        }

        .btn-animate:nth-child(1) {
            animation-delay: 0.3s;
        }

        .btn-animate:nth-child(2) {
            animation-delay: 0.5s;
        }

        .btn-animate:nth-child(3) {
            animation-delay: 0.7s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Options Panel */
        .options-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            background: rgba(250, 249, 247, 0.9);
            backdrop-filter: blur(8px);
        }

        .options-panel.active {
            opacity: 1;
            pointer-events: all;
        }

        .options-content {
            width: 500px;
            padding: 50px;
            border: 1px solid rgba(120, 100, 80, 0.15);
            background: #fff;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
        }

        .options-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 400;
            color: #2a2520;
            letter-spacing: 6px;
            margin-bottom: 10px;
        }

        .options-divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(120, 100, 80, 0.4), transparent);
            margin: 20px auto 35px;
        }

        .option-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 0;
            border-bottom: 1px solid rgba(120, 100, 80, 0.08);
        }

        .option-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            color: rgba(60, 50, 45, 0.7);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .option-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-container {
            position: relative;
            width: 140px;
            height: 4px;
            background: rgba(120, 100, 80, 0.1);
            border-radius: 2px;
            cursor: pointer;
        }

        .slider-fill {
            height: 100%;
            background: linear-gradient(90deg, rgba(139, 115, 85, 0.4), #8b7355);
            border-radius: 2px;
            transition: width 0.2s ease;
        }

        .slider-thumb {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            border: 1px solid #8b7355;
            border-radius: 50%;
            background: #fff;
            transition: left 0.2s ease;
        }

        .slider-value {
            font-family: 'EB Garamond', serif;
            font-size: 14px;
            color: rgba(139, 115, 85, 0.7);
            width: 35px;
            text-align: right;
        }

        .toggle-switch {
            width: 50px;
            height: 24px;
            border: 1px solid rgba(120, 100, 80, 0.25);
            border-radius: 12px;
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .toggle-switch.active {
            border-color: #8b7355;
            background: rgba(139, 115, 85, 0.08);
        }

        .toggle-knob {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(139, 115, 85, 0.3);
            transition: all 0.3s ease;
        }

        .toggle-switch.active .toggle-knob {
            left: 29px;
            background: #8b7355;
        }

        .select-btn {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            letter-spacing: 2px;
            color: rgba(139, 115, 85, 0.7);
            background: transparent;
            border: 1px solid rgba(120, 100, 80, 0.2);
            padding: 6px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .select-btn:hover {
            border-color: rgba(120, 100, 80, 0.4);
            color: #6b5a48;
        }

        .back-btn {
            margin-top: 40px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(60, 50, 45, 0.5);
            background: transparent;
            border: 1px solid rgba(120, 100, 80, 0.15);
            padding: 14px 50px;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .back-btn:hover {
            color: #6b5a48;
            border-color: rgba(120, 100, 80, 0.35);
            background: rgba(120, 100, 80, 0.03);
        }

        /* Exit Confirmation */
        .exit-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            background: rgba(250, 249, 247, 0.9);
            backdrop-filter: blur(8px);
        }

        .exit-panel.active {
            opacity: 1;
            pointer-events: all;
        }

        .exit-content {
            width: 420px;
            padding: 50px;
            border: 1px solid rgba(120, 100, 80, 0.15);
            background: #fff;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
        }

        .exit-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 400;
            color: #2a2520;
            letter-spacing: 4px;
            margin-bottom: 15px;
        }

        .exit-content p {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            color: rgba(60, 50, 45, 0.45);
            font-style: italic;
            margin-bottom: 35px;
        }

        .exit-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .exit-yes,
        .exit-no {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            letter-spacing: 4px;
            text-transform: uppercase;
            padding: 14px 40px;
            cursor: pointer;
            transition: all 0.4s ease;
            background: transparent;
        }

        .exit-yes {
            color: rgba(60, 50, 45, 0.5);
            border: 1px solid rgba(120, 100, 80, 0.15);
        }

        .exit-yes:hover {
            color: #6b5a48;
            border-color: rgba(120, 100, 80, 0.35);
        }

        .exit-no {
            color: #3a3530;
            border: 1px solid rgba(120, 100, 80, 0.25);
        }

        .exit-no:hover {
            color: #6b5a48;
            border-color: #8b7355;
            background: rgba(139, 115, 85, 0.03);
        }

        .decorative-line {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1px;
            height: 200px;
            background: linear-gradient(180deg, transparent, rgba(120, 100, 80, 0.1), transparent);
            z-index: 1;
            pointer-events: none;
        }

        .decorative-line.horizontal {
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(120, 100, 80, 0.1), transparent);
        }

        /* Transition overlay */
        #transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #faf9f7;
            z-index: 8;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #transition-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
    </style>
</head>

<body>
    <!-- Three.js Canvas & Loader -->
    <canvas id="three-canvas"></canvas>
    <canvas id="c" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:4; display:none;"></canvas>
    <div id="three-loader">Preparing entrance...</div>
    <div id="transition-overlay"></div>

    <!-- Background & Decor (light theme) -->
    <div class="bg-pattern"></div>
    <div class="floating-decor decor-1"></div>
    <div class="floating-decor decor-2"></div>
    <div class="floating-decor decor-3"></div>
    <div class="floating-decor decor-4"></div>
    <div class="menu-corner corner-tl"></div>
    <div class="menu-corner corner-tr"></div>
    <div class="menu-corner corner-bl"></div>
    <div class="menu-corner corner-br"></div>
    <div class="decorative-line"></div>
    <div class="decorative-line horizontal"></div>

    <!-- Main Menu (LIGHT THEME) -->
    <div id="menu-overlay">
        <div class="menu-header">
            <div class="subtitle">Welcome to the</div>
            <h1>Virtual Art<br>Pride</h1>
            <div class="divider"></div>
            <div class="tagline">Where imagination becomes reality</div>
        </div>
        <div class="menu-buttons">
            <button class="menu-btn btn-animate" id="btn-start">
                <span class="btn-icon">▸</span>Begin Tour
            </button>
            <button class="menu-btn btn-animate" id="btn-options">
                <span class="btn-icon">◈</span>Options
            </button>
            <button class="menu-btn btn-animate" id="btn-exit">
                <span class="btn-icon">✦</span>Exit
            </button>
        </div>
    </div>

    <!-- Options Panel -->
    <div class="options-panel" id="options-panel">
        <div class="options-content">
            <h2>Options</h2>
            <div class="options-divider"></div>
            <div class="option-row">
                <span class="option-label">Music</span>
                <div class="option-control">
                    <div class="slider-container" id="music-slider" data-value="75">
                        <div class="slider-fill" style="width: 75%"></div>
                        <div class="slider-thumb" style="left: 75%"></div>
                    </div>
                    <span class="slider-value">75</span>
                </div>
            </div>
            <div class="option-row">
                <span class="option-label">Ambience</span>
                <div class="option-control">
                    <div class="slider-container" id="sfx-slider" data-value="60">
                        <div class="slider-fill" style="width: 60%"></div>
                        <div class="slider-thumb" style="left: 60%"></div>
                    </div>
                    <span class="slider-value">60</span>
                </div>
            </div>
            <div class="option-row">
                <span class="option-label">Quality</span>
                <div class="option-control">
                    <button class="select-btn" id="quality-btn">High</button>
                </div>
            </div>
            <div class="option-row">
                <span class="option-label">Fullscreen</span>
                <div class="option-control">
                    <div class="toggle-switch" id="fullscreen-toggle">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
            </div>
            <div class="option-row">
                <span class="option-label">Subtitles</span>
                <div class="option-control">
                    <div class="toggle-switch active" id="subtitles-toggle">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
            </div>
            <button class="back-btn" id="options-back">Return</button>
        </div>
    </div>

    <!-- Exit Confirmation -->
    <div class="exit-panel" id="exit-panel">
        <div class="exit-content">
            <h2>Leaving so soon?</h2>
            <p>The exhibits will await your return.</p>
            <div class="exit-buttons">
                <button class="exit-yes" id="exit-yes">Depart</button>
                <button class="exit-no" id="exit-no">Stay</button>
            </div>
        </div>
    </div>

    <div class="menu-footer">Est. MMXXIV &nbsp;·&nbsp; Admission Free &nbsp;·&nbsp; Open Always</div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <script src="js/Mainroom.js"></script>

    <script>
        // ─── Three.js Gate: DARK ONLY, Menu stays LIGHT ───
        class GateEntrance {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.loader = document.getElementById('three-loader');
                this.active = false;
                this.animationComplete = false;

                // ✅ DARK scene only for the gate
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x0a0a0a, 0.03);
                this.scene.background = new THREE.Color(0x0a0a0a);

                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 2.5, 25); // Start further back

                this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, antialias: true, alpha: false });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.setClearColor(0x0a0a0a, 1);
                this.renderer.shadowMap.enabled = true;

                this.setupLighting();
                this.createGate();
                this.createParticles();

                window.addEventListener('resize', () => this.onResize());
                this.animate();
            }

            setupLighting() {
                const ambient = new THREE.AmbientLight(0x333333, 0.5);
                this.scene.add(ambient);

                const mainLight = new THREE.DirectionalLight(0xbbbbbb, 0.6);
                mainLight.position.set(5, 12, 8);
                mainLight.castShadow = true;
                mainLight.shadow.mapSize.set(2048, 2048);
                this.scene.add(mainLight);

                // Warm glow from inside the museum
                const interiorLight = new THREE.PointLight(0x776655, 0.7, 30);
                interiorLight.position.set(0, 3, -5);
                this.scene.add(interiorLight);

                const rimLight1 = new THREE.PointLight(0x777777, 0.35, 18);
                rimLight1.position.set(-5, 4, 3);
                this.scene.add(rimLight1);

                const rimLight2 = new THREE.PointLight(0x777777, 0.35, 18);
                rimLight2.position.set(5, 4, 3);
                this.scene.add(rimLight2);
            }

            createGate() {
                const gateGroup = new THREE.Group();
                this.gate = gateGroup;

                // === DARK MATERIALS ONLY FOR GATE ===
                const darkStone = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.85, metalness: 0.15 });
                const greyStone = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.9, metalness: 0.1 });
                const darkMetal = new THREE.MeshStandardMaterial({ color: 0x0f0f0f, roughness: 0.5, metalness: 0.8, emissive: 0x080808, emissiveIntensity: 0.2 });
                const metalTrim = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.35, metalness: 0.9 });

                // Columns
                const colGeo = new THREE.CylinderGeometry(0.5, 0.6, 7.5, 12);
                const leftCol = new THREE.Mesh(colGeo, darkStone);
                leftCol.position.set(-4.2, 3.75, 0);
                leftCol.castShadow = true; leftCol.receiveShadow = true;
                gateGroup.add(leftCol);

                const rightCol = new THREE.Mesh(colGeo, darkStone);
                rightCol.position.set(4.2, 3.75, 0);
                rightCol.castShadow = true; rightCol.receiveShadow = true;
                gateGroup.add(rightCol);

                // Bases
                const baseGeo = new THREE.CylinderGeometry(0.85, 1, 0.65, 12);
                const lBase = new THREE.Mesh(baseGeo, greyStone);
                lBase.position.set(-4.2, 0.32, 0); lBase.castShadow = true;
                gateGroup.add(lBase);
                const rBase = new THREE.Mesh(baseGeo, greyStone);
                rBase.position.set(4.2, 0.32, 0); rBase.castShadow = true;
                gateGroup.add(rBase);

                // Capitals
                const capGeo = new THREE.CylinderGeometry(0.6, 0.75, 0.95, 12);
                const lCap = new THREE.Mesh(capGeo, greyStone);
                lCap.position.set(-4.2, 7.7, 0); gateGroup.add(lCap);
                const rCap = new THREE.Mesh(capGeo, greyStone);
                rCap.position.set(4.2, 7.7, 0); gateGroup.add(rCap);

                // Top beam
                const beamGeo = new THREE.BoxGeometry(10, 0.85, 1.4);
                const beam = new THREE.Mesh(beamGeo, darkStone);
                beam.position.set(0, 7.65, 0); beam.castShadow = true;
                gateGroup.add(beam);

                // Metal trim
                const trimGeo = new THREE.BoxGeometry(9.5, 0.13, 0.45);
                const tTop = new THREE.Mesh(trimGeo, metalTrim); tTop.position.set(0, 8.05, 0); gateGroup.add(tTop);
                const tBot = new THREE.Mesh(trimGeo, metalTrim); tBot.position.set(0, 7.25, 0); gateGroup.add(tBot);

                // === OPENING DOORS (DARK) ===
                const dW = 3, dH = 6, dD = 0.18;
                const doorMat = darkMetal;

                // Left door with pivot
                const doorGeo = new THREE.BoxGeometry(dW, dH, dD);
                this.leftDoor = new THREE.Mesh(doorGeo, doorMat);
                this.leftDoor.position.set(1.5, 3, 0.25);
                this.leftDoor.castShadow = true;
                this.leftDoorPivot = new THREE.Group();
                this.leftDoorPivot.position.set(-2.85, 3, 0);
                this.leftDoorPivot.add(this.leftDoor);
                gateGroup.add(this.leftDoorPivot);

                // Right door with pivot
                this.rightDoor = new THREE.Mesh(doorGeo, doorMat);
                this.rightDoor.position.set(-1.5, 3, 0.25);
                this.rightDoor.castShadow = true;
                this.rightDoorPivot = new THREE.Group();
                this.rightDoorPivot.position.set(2.85, 3, 0);
                this.rightDoorPivot.add(this.rightDoor);
                gateGroup.add(this.rightDoorPivot);

                // Door handles
                const hGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.35, 8);
                const hMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.4, metalness: 0.95 });
                const lHandle = new THREE.Mesh(hGeo, hMat);
                lHandle.position.set(2.7, 3, 0.45); lHandle.rotation.z = Math.PI / 2;
                gateGroup.add(lHandle);
                const rHandle = new THREE.Mesh(hGeo, hMat);
                rHandle.position.set(-2.7, 3, 0.45); rHandle.rotation.z = Math.PI / 2;
                gateGroup.add(rHandle);

                // Floor
                const floorGeo = new THREE.PlaneGeometry(35, 35);
                const floorMat = new THREE.MeshStandardMaterial({ color: 0x0d0d0d, roughness: 0.95, metalness: 0.08 });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.rotation.x = -Math.PI / 2; floor.position.y = 0; floor.receiveShadow = true;
                gateGroup.add(floor);

                // Back wall (visible when doors open)
                const wallGeo = new THREE.PlaneGeometry(14, 9);
                const wallMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.95 });
                const backWall = new THREE.Mesh(wallGeo, wallMat);
                backWall.position.set(0, 4.5, -1.2);
                gateGroup.add(backWall);

                // Column details
                this.addColumnDetails(leftCol, -4.2);
                this.addColumnDetails(rightCol, 4.2);

                this.scene.add(gateGroup);
            }

            addColumnDetails(column, xPos) {
                const gGeo = new THREE.CylinderGeometry(0.045, 0.045, 6.5, 6);
                const gMat = new THREE.MeshStandardMaterial({ color: 0x0d0d0d, roughness: 0.9 });
                for (let i = 0; i < 10; i++) {
                    const a = (i / 10) * Math.PI * 2;
                    const g = new THREE.Mesh(gGeo, gMat);
                    g.position.set(Math.cos(a) * 0.52, 3.75, Math.sin(a) * 0.52);
                    g.rotation.z = Math.PI / 2;
                    column.add(g);
                }
            }

            createParticles() {
                const count = 350;
                const pos = new Float32Array(count * 3);
                for (let i = 0; i < count; i++) {
                    pos[i * 3] = (Math.random() - 0.5) * 45;
                    pos[i * 3 + 1] = Math.random() * 22;
                    pos[i * 3 + 2] = (Math.random() - 0.5) * 35;
                }
                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                const mat = new THREE.PointsMaterial({ color: 0x3a3a4a, size: 0.09, transparent: true, opacity: 0.35, sizeAttenuation: true });
                this.particles = new THREE.Points(geo, mat);
                this.scene.add(this.particles);
            }

            openDoors(progress) {
                const angle = Math.PI / 2.1;
                this.leftDoorPivot.rotation.y = -angle * progress;
                this.rightDoorPivot.rotation.y = angle * progress;
            }

            animate() {
                requestAnimationFrame(() => this.animate());

                if (this.gate && !this.animationComplete && !this.active) {
                    this.gate.rotation.y = Math.sin(Date.now() * 0.00025) * 0.006;
                }

                if (this.particles) {
                    const pos = this.particles.geometry.attributes.position.array;
                    for (let i = 0; i < pos.length; i += 3) {
                        pos[i + 1] -= 0.012;
                        if (pos[i + 1] < 0) { pos[i + 1] = 22; pos[i] = (Math.random() - 0.5) * 45; pos[i + 2] = (Math.random() - 0.5) * 35; }
                    }
                    this.particles.geometry.attributes.position.needsUpdate = true;
                }

                if (this.active && !this.animationComplete) this.updateCameraAnimation();
                this.renderer.render(this.scene, this.camera);
            }

            updateCameraAnimation() {
                const duration = 5000;
                const elapsed = Date.now() - this.startTime;
                const p = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - p, 4);

                // Camera: far → gate → through
                const start = new THREE.Vector3(0, 2.5, 25);
                const mid = new THREE.Vector3(0, 2.6, 1.5);
                const end = new THREE.Vector3(0, 2.8, -12);

                if (p < 0.55) {
                    this.camera.position.lerpVectors(start, mid, ease);
                } else {
                    const p2 = (p - 0.55) / 0.45;
                    const e2 = 1 - Math.pow(1 - p2, 3);
                    this.camera.position.lerpVectors(mid, end, e2);
                }

                // Open doors starting at 20% progress
                const doorP = Math.max(0, Math.min(1, (p - 0.2) * 1.4));
                this.openDoors(doorP);

                this.camera.lookAt(0, 2.7 + Math.sin(p * Math.PI) * 0.15, -2);

                if (p >= 1) {
                    this.animationComplete = true;
                    if (this.onComplete) this.onComplete();
                }
            }

            startEntrance(onComplete) {
                this.onComplete = onComplete;
                this.active = true;
                this.animationComplete = false;
                this.startTime = Date.now();

                // Reset
                if (this.leftDoorPivot) this.leftDoorPivot.rotation.y = 0;
                if (this.rightDoorPivot) this.rightDoorPivot.rotation.y = 0;
                this.camera.position.set(0, 2.5, 25);
                this.camera.lookAt(0, 2.5, 0);
                if (this.scene.fog) this.scene.fog.density = 0.03;

                this.canvas.classList.add('active');
                this.loader.classList.add('active');
                setTimeout(() => this.loader.classList.remove('active'), 1200);
            }

            reset() {
                this.active = false; this.animationComplete = false;
                this.canvas.classList.remove('active');
                if (this.leftDoorPivot) this.leftDoorPivot.rotation.y = 0;
                if (this.rightDoorPivot) this.rightDoorPivot.rotation.y = 0;
                this.camera.position.set(0, 2.5, 25);
                this.camera.lookAt(0, 2.5, 0);
            }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }

        let gateEntrance;
        document.addEventListener('DOMContentLoaded', () => {
            gateEntrance = new GateEntrance('three-canvas');
        });

        // ─── Menu Interactions (LIGHT MENU → DARK GATE FLOW) ───
        const menuOverlay = document.getElementById('menu-overlay');
        const optionsPanel = document.getElementById('options-panel');
        const exitPanel = document.getElementById('exit-panel');
        const transitionOverlay = document.getElementById('transition-overlay');

        document.getElementById('btn-start').addEventListener('click', () => {
            // 1. Fade out WHITE menu
            menuOverlay.classList.add('hidden');

            // 2. Brief transition overlay (same light color for smooth fade)
            setTimeout(() => {
                transitionOverlay.classList.add('active');

                // 3. Show dark Three.js canvas & start gate animation
                setTimeout(() => {
                    gateEntrance.startEntrance(() => {
                        // 4. Animation complete - you're inside!
                        setTimeout(() => {
                            transitionOverlay.classList.remove('active');
                            document.getElementById('three-canvas').style.display = 'none';
                            document.getElementById('c').style.display = 'block';
                            museumGestart = true;
                            document.getElementById('c').requestPointerLock();
                            document.getElementById('crosshair').style.display = 'block';
                        }, 400);
                    });
                }, 500);
            }, 700);
        });

        document.getElementById('btn-options').addEventListener('click', () => {
            menuOverlay.style.opacity = '0';
            setTimeout(() => { optionsPanel.classList.add('active'); menuOverlay.style.opacity = '1'; }, 300);
        });
        document.getElementById('options-back').addEventListener('click', () => {
            optionsPanel.classList.remove('active');
        });
        document.getElementById('btn-exit').addEventListener('click', () => exitPanel.classList.add('active'));
        document.getElementById('exit-no').addEventListener('click', () => exitPanel.classList.remove('active'));
        document.getElementById('exit-yes').addEventListener('click', () => {
            document.body.style.transition = 'opacity 1s ease';
            document.body.style.opacity = '0';
            setTimeout(() => {
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#faf9f7;color:#8b7355;font-family:Playfair Display,serif;font-size:24px;letter-spacing:4px;">Thank you for visiting.</div>';
                document.body.style.opacity = '1';
            }, 1000);
        });

        // Sliders & toggles (unchanged)
        document.querySelectorAll('.slider-container').forEach(slider => {
            let drag = false;
            const update = e => {
                const r = slider.getBoundingClientRect();
                let v = Math.round(Math.max(0, Math.min(100, ((e.clientX - r.left) / r.width) * 100)));
                slider.querySelector('.slider-fill').style.width = v + '%';
                slider.querySelector('.slider-thumb').style.left = v + '%';
                slider.parentElement.querySelector('.slider-value').textContent = v;
                slider.dataset.value = v;
            };
            slider.addEventListener('mousedown', e => { drag = true; update(e); });
            document.addEventListener('mousemove', e => { if (drag) update(e); });
            document.addEventListener('mouseup', () => drag = false);
        });
        document.querySelectorAll('.toggle-switch').forEach(t => t.addEventListener('click', () => t.classList.toggle('active')));
        const quals = ['Low', 'Medium', 'High', 'Ultra']; let qIdx = 2;
        document.getElementById('quality-btn').addEventListener('click', () => {
            qIdx = (qIdx + 1) % quals.length;
            document.getElementById('quality-btn').textContent = quals[qIdx];
        });
    </script>

    <div id="crosshair" style="
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 20px;
  height: 20px;
  pointer-events: none;
  z-index: 100;
  display: none;
">
        <div style="position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: white;"></div>
        <div style="position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: white;"></div>
        <div id="joystick-zone" style="position:fixed; bottom:0; left:0; width:150px; height:150px; z-index:1000;"></div>
    </div>
</body>
